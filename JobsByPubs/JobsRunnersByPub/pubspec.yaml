name: jobs_runners
description: Lightweight local Flutter runner widgets for quickly previewing pages with Material, Cupertino, or GetX shells.
version: 0.1.0
homepage: https://local.package
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  get: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
